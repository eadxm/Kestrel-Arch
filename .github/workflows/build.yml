name: Bake Eadxm Arch ISO
on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged 

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Initialize System & Install Archiso
        run: |
          # Generate a stable baseline mirror list for the host container first
          echo "Server = https://geo.mirror.pkgbuild.com/$repo/os/$arch" > /etc/pacman.conf.tmp
          echo "Server = https://mirror.rackspace.com/archlinux/$repo/os/$arch" >> /etc/pacman.conf.tmp
          
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso git dos2unix

      - name: Set Up Custom Profile Architecture
        run: |
          # Copy the stock Arch template profile
          cp -r /usr/share/archiso/configs/releng/ ./build_profile
          
          # Wipe the default template config and write a fresh, perfectly mapped one
          cat << 'EOF' > ./build_profile/pacman.conf
          [options]
          HoldPkg     = pacman glibc
          Architecture = auto
          Color
          CheckSpace
          ParallelDownloads = 5
          SigLevel    = Required DatabaseOptional
          LocalFileSigLevel = Optional

          [core]
          Server = https://geo.mirror.pkgbuild.com/$core/os/$arch
          Server = https://mirror.rackspace.com/archlinux/$core/os/$arch

          [extra]
          Server = https://geo.mirror.pkgbuild.com/$extra/os/$arch
          Server = https://mirror.rackspace.com/archlinux/$extra/os/$arch

          [multilib]
          Server = https://geo.mirror.pkgbuild.com/$multilib/os/$arch
          Server = https://mirror.rackspace.com/archlinux/$multilib/os/$arch
          EOF
          
          # Scrub invisible Windows formatting from the package list
          dos2unix packages.x86_64
          
          # Dynamic target patch: Replace old 'nvidia' string with modern upstream 'nvidia-open'
          sed -i 's/^nvidia$/nvidia-open/g' packages.x86_64
          
          # Append your target package tree to the profile
          cat packages.x86_64 >> ./build_profile/packages.x86_64
          
          # Inject your automated configuration scripts and services
          cp -r airootfs/* ./build_profile/airootfs/
          
          # Scrub invisible Windows formatting from your installer script
          dos2unix ./build_profile/airootfs/usr/local/bin/auto-install.sh
          
          # Grant execution privileges
          chmod +x ./build_profile/airootfs/usr/local/bin/auto-install.sh
          
          # Enable your custom automated setup service on bootup
          ln -s /etc/systemd/system/autoinstall.service ./build_profile/airootfs/etc/systemd/system/multi-user.target.wants/autoinstall.service

      - name: Compile Custom ISO Image
        run: |
          mkdir -p ./output
          mkarchiso -v -w /tmp/archiso-workspace -o ./output ./build_profile

      - name: Upload Finished Bootable ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Eadxm-Arch-Architect-ISO
          path: ./output/*.iso
          retention-days: 7
